<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eric Niyonkuru | EU–Africa Trade & Supply Chain</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0B1215;
    color: white;
    text-align: center;
  }

  .lang-switch {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 1000;
  }

  .lang-switch button {
    margin-left: 8px;
    padding: 8px 14px;
    border: 1px solid #00FFD1;
    background: transparent;
    color: #00FFD1;
    border-radius: 7px;
    font-weight: bold;
    cursor: pointer;
  }

  .lang-switch button.active {
    background: #00FFD1;
    color: #000;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 140px 20px 70px;
  }

  h1 {
    font-size: 4rem;
    margin-bottom: 25px;
  }

  h2 {
    font-size: 2.5rem;
    margin-top: 90px;
  }

  .highlight {
    color: #00FFD1;
    font-size: 1.25rem;
    font-weight: bold;
  }

  p {
    color: #d1d5db;
    font-size: 1.15rem;
    line-height: 1.7;
    max-width: 800px;
    margin: 20px auto;
  }

  .btn {
    display: inline-block;
    margin-top: 32px;
    padding: 15px 32px;
    background: #00FFD1;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
  }

  @media (max-width: 650px) {
    .lang-switch {
      position: static;
      padding-top: 20px;
    }

    h1 {
      font-size: 2.6rem;
    }

    .container {
      padding-top: 60px;
    }
  }
</style>
</head>

<body>

<div class="lang-switch">
  <button id="btn-en" onclick="setLang('en')">EN</button>
  <button id="btn-fr" onclick="setLang('fr')">FR</button>
  <button id="btn-nl" onclick="setLang('nl')">NL</button>
  <button id="btn-sw" onclick="setLang('sw')">SW</button>
</div>

<div class="container">
  <h1>Eric Niyonkuru</h1>

  <p class="highlight" id="title"></p>
  <p id="desc"></p>

  <a href="mailto:eric@ericniyonkuru.com" class="btn" id="contact"></a>

  <h2 id="aboutTitle"></h2>
  <p id="aboutText"></p>

  <h2 id="insightsTitle"></h2>
  <p id="insightsText"></p>
</div>

<script>
const content = {
  en: {
    title: "EU–Africa Trade & Supply Chain Insights",
    desc: "I analyze and simplify cross-border trade, logistics inefficiencies, and supply chain systems between Europe and Africa.",
    contact: "Contact Me",
    aboutTitle: "About",
    aboutText: "Based in Belgium and originally from Burundi, I work at the intersection of emerging markets and structured economies.",
    insightsTitle: "Insights",
    insightsText: "My focus is on trade inefficiencies, logistics costs, market-entry barriers, and supply chain opportunities between Europe and Africa."
  },

  fr: {
    title: "Analyse du commerce et des chaînes d’approvisionnement UE–Afrique",
    desc: "J’analyse et simplifie le commerce transfrontalier, les inefficacités logistiques et les systèmes de chaînes d’approvisionnement entre l’Europe et l’Afrique.",
    contact: "Contactez-moi",
    aboutTitle: "À propos",
    aboutText: "Basé en Belgique et originaire du Burundi, j’évolue à l’intersection des marchés émergents et des économies structurées.",
    insightsTitle: "Analyses",
    insightsText: "Je me concentre sur les inefficacités commerciales, les coûts logistiques, les barrières d’entrée sur les marchés et les opportunités de supply chain entre l’Europe et l’Afrique."
  },

  nl: {
    title: "Inzichten in EU–Afrika handel en supply chains",
    desc: "Ik analyseer en vereenvoudig grensoverschrijdende handel, logistieke inefficiënties en supply-chain-systemen tussen Europa en Afrika.",
    contact: "Neem contact op",
    aboutTitle: "Over mij",
    aboutText: "Ik ben gevestigd in België en kom oorspronkelijk uit Burundi. Ik werk op het snijvlak van opkomende markten en gestructureerde economieën.",
    insightsTitle: "Inzichten",
    insightsText: "Ik focus op handelsinefficiënties, logistieke kosten, markttoegangsbarrières en supply-chain-kansen tussen Europa en Afrika."
  },

  sw: {
    title: "Uchambuzi wa Biashara na Minyororo ya Ugavi kati ya Ulaya na Afrika",
    desc: "Ninachambua na kurahisisha biashara ya mipakani, changamoto za usafirishaji, na mifumo ya ugavi kati ya Ulaya na Afrika.",
    contact: "Wasiliana nami",
    aboutTitle: "Kuhusu",
    aboutText: "Ninaishi Ubelgiji na ninatokea Burundi. Ninafanya kazi katika makutano ya masoko yanayokua na mifumo ya kiuchumi iliyojengeka.",
    insightsTitle: "Uchambuzi",
    insightsText: "Ninazingatia changamoto za biashara, gharama za usafirishaji, vikwazo vya kuingia sokoni, na fursa za minyororo ya ugavi kati ya Ulaya na Afrika."
  }
};

function setLang(lang) {
  const data = content[lang] || content.en;

  document.documentElement.lang = lang;

  document.getElementById("title").textContent = data.title;
  document.getElementById("desc").textContent = data.desc;
  document.getElementById("contact").textContent = data.contact;
  document.getElementById("aboutTitle").textContent = data.aboutTitle;
  document.getElementById("aboutText").textContent = data.aboutText;
  document.getElementById("insightsTitle").textContent = data.insightsTitle;
  document.getElementById("insightsText").textContent = data.insightsText;

  localStorage.setItem("preferredLanguage", lang);

  document.querySelectorAll(".lang-switch button").forEach(btn => {
    btn.classList.remove("active");
  });

  document.getElementById("btn-" + lang).classList.add("active");
}

document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("preferredLanguage") || "en";
  setLang(saved);
});
</script>

</body>
</html>
