<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eric Niyonkuru</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0B1215;
  color: white;
  text-align: center;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 20px;
  right: 20px;
}

.lang-switch button {
  margin-left: 5px;
  padding: 5px 10px;
  border: none;
  cursor: pointer;
  background: #00FFD1;
  color: black;
  border-radius: 4px;
}

/* CONTENT */
.container {
  max-width: 800px;
  margin: auto;
  padding: 100px 20px;
}

h1 { font-size: 3rem; }

.highlight {
  color: #00FFD1;
  margin: 10px 0;
}

p { color: #aaa; }

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #00FFD1;
  color: black;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.section { margin-top: 80px; }
</style>
</head>

<body>

<!-- LANGUAGE BUTTONS -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
  <button onclick="setLang('sw')">SW</button>
</div>

<div class="container">

  <h1>Eric Niyonkuru</h1>

  <p class="highlight" id="title"></p>
  <p id="desc"></p>

  <a href="#" class="btn" id="contact"></a>

  <div class="section">
    <h2 id="aboutTitle"></h2>
    <p id="aboutText"></p>
  </div>

</div>

<script>
const content = {
  en: {
    title: "EU–Africa Trade & Supply Chain Insights",
    desc: "I analyze and simplify cross-border trade, logistics inefficiencies, and supply chain systems between Europe and Africa.",
    contact: "Contact Me",
    aboutTitle: "About",
    aboutText: "Based in Belgium and originally from Burundi, I operate at the intersection of emerging and structured markets."
  },

  fr: {
    title: "Analyse du commerce et des chaînes d'approvisionnement UE–Afrique",
    desc: "J'analyse et simplifie le commerce transfrontalier, les inefficacités logistiques et les systèmes de supply chain.",
    contact: "Contactez-moi",
    aboutTitle: "À propos",
    aboutText: "Basé en Belgique et originaire du Burundi, j'interviens à l'intersection des marchés émergents et structurés."
  },

  sw: {
    title: "Uchambuzi wa Biashara kati ya Ulaya na Afrika",
    desc: "Ninachambua na kurahisisha biashara ya mipakani na mifumo ya ugavi.",
    contact: "Wasiliana nami",
    aboutTitle: "Kuhusu",
    aboutText: "Niko Ubelgiji na natoka Burundi, nikifanya kazi kati ya masoko yanayokua na yaliyoendelea."
  }
};

function setLang(lang) {
  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("desc").innerText = content[lang].desc;
  document.getElementById("contact").innerText = content[lang].contact;
  document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;
  document.getElementById("aboutText").innerText = content[lang].aboutText;
}

// Default language
setLang('en');
</script>

</body>
</html>
